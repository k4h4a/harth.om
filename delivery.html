<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Apply the saved language/direction before first paint so there's no
      // flash of Arabic/RTL when the visitor's saved language is English.
      (function () {
        try {
          if (localStorage.getItem("harth_lang") === "en") {
            document.documentElement.lang = "en";
            document.documentElement.dir = "ltr";
          }
        } catch (e) {}
        document.documentElement.classList.add("i18n-loading");
      })();
    </script>
    <style>
      html.i18n-loading body {
        visibility: hidden;
      }
    </style>
    <title data-i18n="delivery.title">لوحة المندوب - حرث</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="design-system.css" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Cairo", sans-serif;
        background: linear-gradient(135deg, #1a3a1a 0%, #0f1f0f 100%);
        color: #f1f2f6;
        min-height: 100vh;
      }
      .topbar {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        padding: 14px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .topbar h1 { font-size: 22px; color: #6ab04c; }
      .btn-logout {
        background: rgba(231, 76, 60, 0.8);
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
      }
      .container { max-width: 1000px; margin: 24px auto; padding: 0 20px; }

      .tabs {
        display: flex;
        gap: 6px;
        background: rgba(255, 255, 255, 0.05);
        padding: 6px;
        border-radius: 12px;
        margin-bottom: 20px;
      }
      .tab {
        padding: 12px 20px;
        border: none;
        background: transparent;
        color: #ddd;
        cursor: pointer;
        border-radius: 8px;
        font-family: inherit;
        font-weight: 600;
        flex: 1;
      }
      .tab.active { background: #6ab04c; color: #fff; }
      .tab-content { display: none; }
      .tab-content.active { display: block; }

      .job-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 14px;
      }
      .job-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .job-number { font-size: 15px; color: #6ab04c; font-weight: 700; }
      .job-number code {
        background: rgba(0, 0, 0, 0.3);
        padding: 2px 8px;
        border-radius: 6px;
      }
      .job-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 10px 0;
      }
      @media (max-width: 600px) {
        .job-info { grid-template-columns: 1fr; }
      }
      .job-info-item {
        background: rgba(0, 0, 0, 0.2);
        padding: 10px;
        border-radius: 8px;
      }
      .job-info-item .label { font-size: 12px; color: #aaa; margin-bottom: 3px; }
      .job-info-item .value { font-size: 14px; color: #fff; }

      .job-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 700;
        font-size: 14px;
      }
      .btn-green { background: #6ab04c; color: #fff; }
      .btn-blue { background: #3498db; color: #fff; }
      .btn-orange { background: #e67e22; color: #fff; }
      .btn-red { background: #c0392b; color: #fff; }

      .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge.yellow { background: rgba(241, 196, 15, 0.3); color: #ffeaa7; }
      .badge.blue { background: rgba(52, 152, 219, 0.3); color: #a3d5ff; }
      .badge.green { background: rgba(106, 176, 76, 0.3); color: #a9dc98; }
      .badge.red { background: rgba(231, 76, 60, 0.3); color: #ffb3b3; }

      .loading, .empty { text-align: center; padding: 40px; color: #888; }
      .empty i {
        font-size: 48px; color: #6ab04c;
        display: block; margin-bottom: 12px;
      }

      #toast {
        position: fixed;
        bottom: 24px;
        inset-inline-start: 50%;
        transform: translateX(-50%);
        background: #2d5016;
        color: #fff;
        padding: 12px 22px;
        border-radius: 8px;
        z-index: 2000;
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
      }
      #toast.show { opacity: 1; }
      #toast.error { background: #c0392b; }
    </style>
  
    <!-- HARTH-RESPONSIVE-CSS -->
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <header class="header-container">
      <div class="header-capsule">
        <div class="section right">
          <div class="site-brand">
            <img src="شعار حرث.jpeg" alt="شعار حرث" />
            <h1>حــرث</h1>
          </div>
        </div>
        <nav class="section center">
          <ul class="nav-links"></ul>
        </nav>
        <div class="section left" id="auth-header">
          <a href="register.html" class="hs-btn hs-btn--ghost hs-btn--sm" id="login-link" data-i18n="common.buttons.login">تسجيل دخول</a>
        </div>
      </div>
    </header>

    <div class="container">
      <!-- Account-status banner (shown for pending/rejected couriers) -->
      <div id="status-banner" style="display:none;background:rgba(241,196,15,0.12);border:1px solid #f1c40f;border-radius:14px;padding:16px;margin-bottom:14px">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <i class="fas fa-info-circle" id="status-banner-icon" style="font-size:24px;color:#f1c40f;margin-top:2px"></i>
          <div style="flex:1">
            <div id="status-banner-title" style="font-weight:700;font-size:16px" data-i18n="delivery.statusBanner.defaultTitle">حسابك قيد المراجعة</div>
            <div id="status-banner-msg" style="font-size:14px;color:#ddd;margin-top:6px" data-i18n="delivery.statusBanner.defaultMsg">
              حسابك كمندوب توصيل قيد المراجعة من قِبل الإدارة. لا يمكنك قبول طلبات التوصيل حتى الموافقة على حسابك.
            </div>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="available">
          <i class="fas fa-inbox"></i> <span data-i18n="delivery.tabs.available">طلبات متاحة</span>
          <span id="available-count" style="margin-inline-start:6px"></span>
        </button>
        <button class="tab" data-tab="mine">
          <i class="fas fa-user-check"></i> <span data-i18n="delivery.tabs.mine">طلباتي النشطة</span>
          <span id="mine-count" style="margin-inline-start:6px"></span>
        </button>
        <button class="tab" data-tab="history">
          <i class="fas fa-history"></i> <span data-i18n="delivery.tabs.history">السجل</span>
        </button>
      </div>

      <div id="tab-available" class="tab-content active">
        <div id="available-list"></div>
      </div>
      <div id="tab-mine" class="tab-content">
        <div id="mine-list"></div>
      </div>
      <div id="tab-history" class="tab-content">
        <div id="history-list"></div>
      </div>
    </div>

    <div id="toast"></div>

    <script src="i18n.js"></script>
    <script src="lang-switcher.js"></script>
    <script src="design-system.js"></script>
    <script src="unified-nav.js"></script>
    <script src="script.js"></script>
    <script>
      // =================================================================
      // delivery.html — courier panel. Lists available jobs, claims them,
      // updates status through pickup/in_transit/delivered.
      // =================================================================
      (function () {
        "use strict";

        const $ = (s) => document.querySelector(s);
        const $$ = (s) => Array.from(document.querySelectorAll(s));

        function t(key, vars) {
          return window.HarthI18n ? window.HarthI18n.t(key, vars) : key;
        }
        function localeTag() {
          return window.HarthI18n ? window.HarthI18n.localeTag() : "ar";
        }

        function showToast(msg, isError = false) {
          const t = $("#toast");
          t.textContent = msg;
          t.classList.toggle("error", isError);
          t.classList.add("show");
          setTimeout(() => t.classList.remove("show"), 3000);
        }

        function escapeHtml(s) {
          if (s == null) return "";
          return String(s).replace(/[&<>"']/g, (c) =>
            ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]),
          );
        }

        // Renders an elegant skeleton for delivery-job lists. Used by all
        // three tabs (available/mine/history) so the courier sees the
        // same loading pattern instead of a generic spinner.
        function deliverySkeleton(count = 3) {
          const item = `
            <div class="hs-card" style="padding:var(--sp-4);margin-bottom:var(--sp-3)">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-3)">
                <div class="skeleton skeleton--title" style="width:35%"></div>
                <div class="skeleton" style="height:24px;width:90px;border-radius:var(--r-pill)"></div>
              </div>
              <div class="skeleton skeleton--text" style="width:70%;margin-bottom:var(--sp-2)"></div>
              <div class="skeleton skeleton--text" style="width:50%;margin-bottom:var(--sp-3)"></div>
              <div style="display:flex;gap:var(--sp-2)">
                <div class="skeleton skeleton--button" style="width:120px"></div>
                <div class="skeleton skeleton--button" style="width:90px"></div>
              </div>
            </div>
          `;
          return Array.from({ length: count }, () => item).join("");
        }

        // Themed empty-state for delivery lists. Variant lets the same
        // markup serve "no jobs available", "no active jobs", and the
        // "history is empty" cases without code duplication.
        function deliveryEmptyState(variant) {
          const icons = {
            available: '<path d="M16 24L22 30L34 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2"/>',
            mine: '<path d="M14 24V36C14 37.1046 14.8954 38 16 38H32C33.1046 38 34 37.1046 34 36V24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 16H38L34 24H14L10 16Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M20 28H28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
            history: '<circle cx="24" cy="24" r="18" stroke="currentColor" stroke-width="2"/><path d="M24 14V24L30 28" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
          };
          const icon = icons[variant] || icons.available;
          const title = t(`delivery.emptyStates.${variant}.title`);
          const desc = t(`delivery.emptyStates.${variant}.desc`);
          return `
            <div class="hs-empty">
              <div class="hs-empty__art">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">${icon}</svg>
              </div>
              <h3 class="hs-empty__title">${title}</h3>
              <p class="hs-empty__desc">${desc}</p>
            </div>
          `;
        }

        function statusLabel(s) {
          const label = t(`delivery.statusLabels.${s}`);
          return label.startsWith("delivery.statusLabels.") ? s : label;
        }
        function statusColor(s) {
          return ({
            pending: "yellow", accepted: "blue", picked_up: "blue",
            in_transit: "blue", delivered: "green", cancelled: "red",
          })[s] || "yellow";
        }

        function enforceAuth() {
          const user = getUser ? getUser() : null;
          if (!getToken || !getToken() || !user) {
            window.location.href = "register.html";
            return null;
          }
          if (user.role !== "delivery" && user.role !== "admin") {
            alert(t("delivery.alerts.deliveryOnly"));
            window.location.href = "index.html";
            return null;
          }
          return user;
        }

        function safeJson(s) {
          try { return typeof s === "object" ? s : JSON.parse(s); }
          catch { return {}; }
        }
        function formatAddress(a) {
          if (!a || typeof a !== "object") return "—";
          const parts = [a.city, a.street, a.landmark].filter(Boolean);
          return parts.length ? parts.join(" · ") : "—";
        }

        // ---------- Fetch helpers ----------
        async function fetchAvailable() {
          const res = await apiFetch("/deliveries?scope=available&limit=50");
          if (!res?.success) throw new Error(res?.error?.message || t("delivery.toasts.loadFailed"));
          return res.items || [];
        }
        async function fetchMine(historyOnly = false) {
          const res = await apiFetch("/deliveries?scope=mine&limit=100");
          if (!res?.success) throw new Error(res?.error?.message || t("delivery.toasts.loadFailed"));
          const items = res.items || [];
          return historyOnly
            ? items.filter((d) => ["delivered", "cancelled"].includes(d.status))
            : items.filter((d) => !["delivered", "cancelled"].includes(d.status));
        }

        // Fetch order details for a delivery card (order number, total, items summary)
        const orderCache = {};
        async function fetchOrderMeta(orderId) {
          if (!orderId) return null;
          if (orderCache[orderId]) return orderCache[orderId];
          try {
            // Use admin scope since couriers don't own the order
            const res = await apiFetch(`/orders/${orderId}`);
            if (res && res.success && res.order) {
              orderCache[orderId] = res.order;
              return res.order;
            }
          } catch (_e) {}
          return null;
        }

        // ---------- Render a job card ----------
        function renderJob(d, actions) {
          const pickup = typeof d.pickup_address === "string"
            ? safeJson(d.pickup_address) : d.pickup_address;
          const dropoff = typeof d.dropoff_address === "string"
            ? safeJson(d.dropoff_address) : d.dropoff_address;

          // Build extra info from order or rental if linked
          const dirArrow = document.documentElement.getAttribute("dir") === "rtl" ? "←" : "→";
          let orderInfoHtml = "";
          if (d.rental_meta) {
            const r = d.rental_meta;
            const rTotal = (Number(r.total_price || 0) + Number(r.deposit_amount || 0)).toFixed(2);
            const startD = (r.start_date || "").slice(0, 10);
            const endD   = (r.end_date || "").slice(0, 10);
            orderInfoHtml = `
              <div style="background:rgba(241,196,15,0.08);border:1px solid rgba(241,196,15,0.25);border-radius:8px;padding:10px;margin:10px 0;font-size:13px">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                  <span style="color:#f1c40f;font-weight:700"><i class="fas fa-key"></i> ${t("delivery.job.rentalPrefix")} — ${escapeHtml(r.tracking_number || "")}</span>
                  <span style="color:#fff;font-weight:700">${rTotal} ${t("common.currency")}</span>
                </div>
                <div style="color:#bbb;margin-bottom:4px">${escapeHtml(r.equipment_name || t("delivery.job.equipmentFallback"))}</div>
                <div style="color:#888"><i class="fas fa-calendar-alt"></i> ${startD} ${dirArrow} ${endD}</div>
              </div>
            `;
          } else if (d.order_meta) {
            const o = d.order_meta;
            const itemsSummary = (o.items || []).slice(0, 3)
              .map(it => `${escapeHtml(it.equipment_name_snapshot || t("delivery.job.productFallback"))} × ${it.quantity}`)
              .join(t("delivery.job.listSeparator"));
            const more = (o.items || []).length > 3 ? ` (+${o.items.length - 3})` : "";
            orderInfoHtml = `
              <div style="background:rgba(106,176,76,0.08);border:1px solid rgba(106,176,76,0.2);border-radius:8px;padding:10px;margin:10px 0;font-size:13px">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                  <span style="color:#6ab04c;font-weight:700"><i class="fas fa-receipt"></i> ${escapeHtml(o.tracking_number || "")}</span>
                  <span style="color:#fff;font-weight:700">${Number(o.total || 0).toFixed(2)} ${t("common.currency")}</span>
                </div>
                ${itemsSummary ? `<div style="color:#bbb">${itemsSummary}${more}</div>` : ""}
                <div style="color:#888;margin-top:4px">
                  <i class="fas fa-credit-card"></i> ${o.payment_method === "cash_on_delivery" ? t("delivery.job.paymentCod") : t("delivery.job.paymentCard")}
                </div>
              </div>
            `;
          }

          const feeHtml = d.fee && Number(d.fee) > 0
            ? `<span style="background:rgba(241,196,15,0.15);border:1px solid rgba(241,196,15,0.3);padding:3px 10px;border-radius:999px;font-size:12px;color:#f1c40f"><i class="fas fa-coins"></i> ${t("delivery.job.feeLabel", { amount: Number(d.fee).toFixed(2), currency: t("common.currency") })}</span>`
            : "";

          return `
            <div class="job-card">
              <div class="job-header">
                <div class="job-number"><i class="fas fa-truck"></i> <code>#${d.id.slice(0, 8).toUpperCase()}</code></div>
                <span class="badge ${statusColor(d.status)}">${statusLabel(d.status)}</span>
              </div>
              ${orderInfoHtml}
              <div class="job-info">
                <div class="job-info-item">
                  <div class="label"><i class="fas fa-map-marker-alt" style="color:#e74c3c"></i> ${t("delivery.job.pickupLabel")}</div>
                  <div class="value">${escapeHtml(formatAddress(pickup))}</div>
                </div>
                <div class="job-info-item">
                  <div class="label"><i class="fas fa-flag-checkered" style="color:#6ab04c"></i> ${t("delivery.job.dropoffLabel")}</div>
                  <div class="value">${escapeHtml(formatAddress(dropoff))}</div>
                </div>
              </div>
              ${feeHtml ? `<div style="margin:8px 0">${feeHtml}</div>` : ""}
              ${d.notes ? `<div style="background:rgba(0,0,0,0.2);padding:8px;border-radius:6px;font-size:13px;color:#ccc;margin-bottom:10px"><i class="fas fa-sticky-note"></i> ${escapeHtml(d.notes)}</div>` : ""}
              <div style="font-size:12px;color:#666;margin-bottom:8px">
                <i class="fas fa-clock"></i> ${new Date(d.created_at).toLocaleString(localeTag())}
              </div>
              <div class="job-actions">${actions}</div>
            </div>
          `;
        }

        // Enrich deliveries with order metadata then re-render
        async function enrichAndRender(items, containerId, actionsBuilder) {
          const container = document.getElementById(containerId);
          if (!container) return;

          // Kick off all fetches in parallel
          const metas = await Promise.all(items.map(async (d) => {
            if (d.order_id) {
              return fetchOrderMeta(d.order_id);
            }
            return null;
          }));

          container.innerHTML = items.map((d, i) => {
            d.order_meta = metas[i];
            return renderJob(d, actionsBuilder(d));
          }).join("");

          // Wire action buttons
          wireActionButtons(container);
          container.querySelectorAll("[data-accept]").forEach((b) =>
            b.addEventListener("click", () => actOn("accept", b.dataset.accept)),
          );
        }

        // Determine next-step buttons by status
        function nextActions(d) {
          switch (d.status) {
            case "accepted":
              return `<button class="btn btn-blue" data-pickup="${d.id}"><i class="fas fa-dolly"></i> ${t("delivery.jobActions.pickup")}</button>`;
            case "picked_up":
              return `<button class="btn btn-orange" data-transit="${d.id}"><i class="fas fa-route"></i> ${t("delivery.jobActions.startTransit")}</button>`;
            case "in_transit":
              return `<button class="btn btn-green" data-delivered="${d.id}"><i class="fas fa-check-circle"></i> ${t("delivery.jobActions.delivered")}</button>`;
            default:
              return "";
          }
        }

        function wireActionButtons(root) {
          root.querySelectorAll("[data-pickup]").forEach((b) =>
            b.addEventListener("click", () => actOn("pickup", b.dataset.pickup)),
          );
          root.querySelectorAll("[data-transit]").forEach((b) =>
            b.addEventListener("click", () => actOn("in-transit", b.dataset.transit)),
          );
          root.querySelectorAll("[data-delivered]").forEach((b) =>
            b.addEventListener("click", () => actOn("delivered", b.dataset.delivered)),
          );
        }

        // Actions that require a proof photo before submission.
        const ACTIONS_NEEDING_PROOF = new Set(["pickup", "delivered"]);

        async function actOn(action, deliveryId) {
          const labelKeys = {
            accept: "accept",
            pickup: "pickup",
            "in-transit": "inTransit",
            delivered: "delivered",
          };
          const label = t(`delivery.actionLabels.${labelKeys[action]}`);

          // For pickup & delivered, open the proof-upload modal first.
          // For accept & in-transit, a simple confirm is enough.
          let proofUrls = [];
          let proofLocation = null;
          if (ACTIONS_NEEDING_PROOF.has(action)) {
            const result = await askForProofPhoto(label);
            if (!result) return; // user cancelled
            proofUrls = result.urls || [];
            proofLocation = result.location || null;
          } else {
            if (!confirm(t("delivery.confirmAction", { label }))) return;
          }

          try {
            const body = {};
            if (proofUrls.length) body.proof_images = proofUrls;
            if (proofLocation) body.proof_location = proofLocation;
            const res = await apiFetch(`/deliveries/${deliveryId}/${action}`, {
              method: "POST",
              body: JSON.stringify(body),
            });
            if (!res?.success) throw new Error(res?.error?.message || t("delivery.toasts.genericFailed"));
            showToast(t("delivery.toasts.actionSuccess"));
            loadAvailable();
            loadMine();
          } catch (err) {
            showToast(err.message, true);
          }
        }

        // ---------- GPS helper ----------
        function captureGps(timeoutMs = 8000) {
          return new Promise((resolve) => {
            if (!navigator.geolocation) return resolve(null);
            navigator.geolocation.getCurrentPosition(
              (pos) => resolve({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                accuracy: Math.round(pos.coords.accuracy),
                client_ts: new Date().toISOString(),
              }),
              () => resolve(null),
              { enableHighAccuracy: true, timeout: timeoutMs, maximumAge: 0 },
            );
          });
        }

        // ---------- Proof-photo modal ----------
        // Returns { urls, location } or null if cancelled.
        // Forces camera capture (capture="environment"); on mobile this
        // disables the gallery picker. Desktop browsers ignore the attribute.
        function askForProofPhoto(actionLabel) {
          return new Promise((resolve) => {
            const overlay = document.createElement("div");
            overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px";
            overlay.innerHTML = `
              <div style="background:#1a3a1a;border-radius:14px;padding:24px;max-width:460px;width:100%;color:#fff">
                <h3 style="color:#6ab04c;margin-bottom:8px">
                  <i class="fas fa-camera"></i> ${escapeHtml(actionLabel)}
                </h3>
                <p style="color:#bbb;font-size:13px;margin-bottom:10px">
                  ${t("delivery.proofModal.instructions")}
                </p>

                <!-- GPS status bar -->
                <div id="gps-bar" style="background:rgba(241,196,15,0.12);border:1px solid rgba(241,196,15,0.3);border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
                  <i class="fas fa-location-dot" style="color:#f1c40f"></i>
                  <span id="gps-text" style="color:#f1c40f">${t("delivery.proofModal.gpsDetecting")}</span>
                </div>

                <!-- Camera-only file input: capture="environment" on mobile blocks gallery -->
                <label style="display:block;background:rgba(106,176,76,0.15);border:2px dashed rgba(106,176,76,0.5);border-radius:10px;padding:16px;text-align:center;cursor:pointer;margin-bottom:12px">
                  <i class="fas fa-camera" style="font-size:28px;color:#6ab04c;display:block;margin-bottom:6px"></i>
                  <span style="font-size:13px;color:#bbb">${t("delivery.proofModal.tapToOpenCamera")}</span>
                  <input type="file" id="proof-input" accept="image/*" capture="environment"
                    style="display:none" />
                </label>

                <div id="proof-preview" style="margin-bottom:12px"></div>
                <div id="proof-status" style="font-size:13px;color:#aaa;margin-bottom:12px;min-height:18px"></div>

                <div style="display:flex;gap:8px">
                  <button id="proof-submit" class="btn btn-green" disabled style="flex:1;opacity:0.5">
                    <i class="fas fa-check"></i> ${t("delivery.proofModal.confirmSubmitBtn")}
                  </button>
                  <button id="proof-retake" class="btn btn-blue" style="flex:1;display:none">
                    <i class="fas fa-redo"></i> ${t("delivery.proofModal.retakeBtn")}
                  </button>
                  <button id="proof-cancel" class="btn btn-red" style="flex:0 0 auto;padding:8px 14px">
                    ${t("delivery.proofModal.cancelBtn")}
                  </button>
                </div>
              </div>
            `;
            document.body.appendChild(overlay);

            const fileInput  = overlay.querySelector("#proof-input");
            const preview    = overlay.querySelector("#proof-preview");
            const status     = overlay.querySelector("#proof-status");
            const submitBtn  = overlay.querySelector("#proof-submit");
            const retakeBtn  = overlay.querySelector("#proof-retake");
            const cancelBtn  = overlay.querySelector("#proof-cancel");
            const gpsText    = overlay.querySelector("#gps-text");
            let uploadedUrls = [];
            let capturedGps  = null;

            // Start GPS capture immediately when modal opens
            captureGps().then((loc) => {
              capturedGps = loc;
              if (loc) {
                gpsText.textContent = t("delivery.proofModal.gpsSuccess", { accuracy: loc.accuracy });
                gpsText.style.color = "#a9dc98";
                overlay.querySelector("#gps-bar").style.borderColor = "rgba(106,176,76,0.4)";
                overlay.querySelector("#gps-bar").style.background = "rgba(106,176,76,0.08)";
              } else {
                gpsText.textContent = t("delivery.proofModal.gpsFailed");
                gpsText.style.color = "#ffb3b3";
              }
            });

            function cleanup(result) {
              document.body.removeChild(overlay);
              resolve(result);
            }

            function resetCapture() {
              fileInput.value = "";
              preview.innerHTML = "";
              status.textContent = "";
              submitBtn.disabled = true;
              submitBtn.style.opacity = "0.5";
              retakeBtn.style.display = "none";
              uploadedUrls = [];
            }

            fileInput.addEventListener("change", async () => {
              const file = fileInput.files[0];
              if (!file) return;

              // Freshness: record exact moment of capture
              capturedGps = capturedGps
                ? { ...capturedGps, client_ts: new Date().toISOString() }
                : { client_ts: new Date().toISOString() };

              status.textContent = t("delivery.proofModal.uploading");
              status.style.color = "#aaa";
              submitBtn.disabled = true;
              submitBtn.style.opacity = "0.5";

              // Instant local preview
              const objectUrl = URL.createObjectURL(file);
              preview.innerHTML = `<img src="${objectUrl}" style="max-width:100%;max-height:200px;border-radius:8px;border:2px solid rgba(255,255,255,0.2)" />`;

              try {
                const fd = new FormData();
                fd.append("image", file);
                const token = getToken ? getToken() : localStorage.getItem("token");
                const r = await fetch("/api/v1/uploads/image", {
                  method: "POST",
                  headers: { Authorization: `Bearer ${token}` },
                  body: fd,
                });
                const data = await r.json();
                if (!r.ok || !data?.success) throw new Error(data?.error?.message || t("delivery.proofModal.uploadFailed"));
                uploadedUrls = [data.url];
                preview.innerHTML = `<img src="${escapeHtml(data.url)}" style="max-width:100%;max-height:200px;border-radius:8px;border:2px solid #6ab04c" />`;
                status.textContent = t("delivery.proofModal.uploadSuccess");
                status.style.color = "#a9dc98";
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                retakeBtn.style.display = "block";
              } catch (err) {
                preview.innerHTML = "";
                status.textContent = err.message;
                status.style.color = "#ffb3b3";
                uploadedUrls = [];
              }
            });

            retakeBtn.addEventListener("click", resetCapture);
            submitBtn.addEventListener("click", () => cleanup({ urls: uploadedUrls, location: capturedGps }));
            cancelBtn.addEventListener("click", () => cleanup(null));
          });
        }

        // ---------- Render a list of jobs (order_meta already embedded by server) ----------
        function renderList(items, containerId, actionsBuilder) {
          const container = document.getElementById(containerId);
          if (!container) return;
          container.innerHTML = items.map((d) => renderJob(d, actionsBuilder(d))).join("");
          wireActionButtons(container);
          container.querySelectorAll("[data-accept]").forEach((b) =>
            b.addEventListener("click", () => actOn("accept", b.dataset.accept)),
          );
        }

        // ---------- Tabs ----------
        async function loadAvailable() {
          $("#available-list").innerHTML = deliverySkeleton(3);
          try {
            const items = await fetchAvailable();
            $("#available-count").textContent = items.length ? `(${items.length})` : "";
            if (!items.length) {
              $("#available-list").innerHTML = deliveryEmptyState("available");
              return;
            }
            renderList(items, "available-list", (d) =>
              `<button class="btn btn-green" data-accept="${d.id}"><i class="fas fa-check"></i> ${t("delivery.jobActions.accept")}</button>`
            );
          } catch (err) {
            $("#available-list").innerHTML = `<div class="empty" style="color:#ffb3b3">${escapeHtml(err.message)}</div>`;
          }
        }

        async function loadMine() {
          $("#mine-list").innerHTML = deliverySkeleton(2);
          try {
            const items = await fetchMine(false);
            $("#mine-count").textContent = items.length ? `(${items.length})` : "";
            if (!items.length) {
              $("#mine-list").innerHTML = deliveryEmptyState("mine");
              return;
            }
            renderList(items, "mine-list", (d) => nextActions(d));
          } catch (err) {
            $("#mine-list").innerHTML = `<div class="empty" style="color:#ffb3b3">${escapeHtml(err.message)}</div>`;
          }
        }

        async function loadHistory() {
          $("#history-list").innerHTML = deliverySkeleton(2);
          try {
            const items = await fetchMine(true);
            if (!items.length) {
              $("#history-list").innerHTML = deliveryEmptyState("history");
              return;
            }
            renderList(items, "history-list", () => "");
          } catch (err) {
            $("#history-list").innerHTML = `<div class="empty" style="color:#ffb3b3">${escapeHtml(err.message)}</div>`;
          }
        }

        $$(".tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            $$(".tab").forEach((b) => b.classList.remove("active"));
            $$(".tab-content").forEach((c) => c.classList.remove("active"));
            btn.classList.add("active");
            $("#tab-" + btn.dataset.tab).classList.add("active");

            if (btn.dataset.tab === "available") loadAvailable();
            if (btn.dataset.tab === "mine") loadMine();
            if (btn.dataset.tab === "history") loadHistory();
          });
        });

        // logout handled by script.js dropdown

        // Show/hide the account-approval banner. For not-yet-approved
        // couriers we additionally hide the tabs/job board so they don't
        // try to accept jobs the API will reject.
        function renderStatusBanner(user) {
          const banner = $("#status-banner");
          const tabs = document.querySelector(".tabs");
          const tabContents = document.querySelectorAll(".tab-content");

          if (!banner) return;
          if (user.role === "admin" || user.account_status === "approved") {
            banner.style.display = "none";
            return;
          }

          let title, msg, color;
          if (user.account_status === "pending") {
            color = "#f1c40f";
            title = t("delivery.statusBanner.pendingTitle");
            msg = t("delivery.statusBanner.pendingMsg");
          } else if (user.account_status === "rejected") {
            color = "#e74c3c";
            title = t("delivery.statusBanner.rejectedTitle");
            msg = (user.status_reason ? `${t("delivery.statusBanner.rejectedReasonPrefix")} ${user.status_reason}. ` : "") +
              t("delivery.statusBanner.rejectedMsg");
          } else {
            color = "#e74c3c";
            title = t("delivery.statusBanner.inactiveTitle");
            msg = t("delivery.statusBanner.inactiveMsg");
          }

          banner.style.background = `${color}1f`;
          banner.style.borderColor = color;
          $("#status-banner-icon").style.color = color;
          $("#status-banner-title").textContent = title;
          $("#status-banner-msg").textContent = msg;
          banner.style.display = "block";

          // Hide the job board UI for non-approved couriers.
          if (tabs) tabs.style.display = "none";
          tabContents.forEach((c) => (c.style.display = "none"));
        }

        // Refresh the cached user record from the server so status changes
        // (e.g. an admin just approved this account) take effect immediately
        // without forcing the courier to log out and back in.
        async function refreshUserFromServer() {
          try {
            const r = await apiFetch("/auth/me");
            if (r && r.success && r.user) {
              localStorage.setItem("user", JSON.stringify(r.user));
              return r.user;
            }
          } catch (_e) {}
          return null;
        }

        document.addEventListener("DOMContentLoaded", async () => {
          if (window.HarthI18n) await window.HarthI18n.ready();

          const user = enforceAuth();
          if (!user) return;

          // Pull a fresh copy in case the admin just changed the status,
          // then render the banner. If the request fails we fall back to
          // the cached user.
          const fresh = (await refreshUserFromServer()) || user;
          renderStatusBanner(fresh);

          if (window.HarthI18n) {
            document.addEventListener("harth:langchange", () => {
              renderStatusBanner(fresh);
              const activeTab = document.querySelector(".tab.active")?.dataset.tab;
              if (activeTab === "available") loadAvailable();
              else if (activeTab === "mine") loadMine();
              else if (activeTab === "history") loadHistory();
            });
          }

          // Pending/rejected couriers don't get the auto-refreshing job
          // board — the banner replaces it.
          if (fresh.role !== "admin" && fresh.account_status !== "approved") {
            return;
          }

          loadAvailable();
          fetchMine(false).then((items) => {
            $("#mine-count").textContent = items.length ? `(${items.length})` : "";
          }).catch(() => {});

          // Auto-refresh every 15 seconds so new jobs appear without the
          // courier having to reload manually. Only re-fetches the active
          // tab to keep traffic light. We pause when the tab is hidden.
          const REFRESH_MS = 15000;
          setInterval(() => {
            if (document.hidden) return;
            const activeTab = document.querySelector(".tab.active")?.dataset.tab;
            if (activeTab === "available") loadAvailable();
            else if (activeTab === "mine") loadMine();
            else if (activeTab === "history") loadHistory();
          }, REFRESH_MS);

          // Also reload immediately when the user comes back to the tab —
          // covers the case where they were away for hours.
          document.addEventListener("visibilitychange", () => {
            if (document.hidden) return;
            const activeTab = document.querySelector(".tab.active")?.dataset.tab;
            if (activeTab === "available") loadAvailable();
            else if (activeTab === "mine") loadMine();
          });
        });
      })();
    </script>
  
    <!-- HARTH-RESPONSIVE-JS -->
    <script src="responsive.js" defer></script>
  </body>
