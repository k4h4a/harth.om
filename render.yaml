databases:
  - name: harth-db
    plan: basic-256mb
    region: oregon

services:
  - type: web
    name: harth-web
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: harth-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: harth-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: harth-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: harth-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: harth-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: harth-db
          property: database
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      # Set these in the Render dashboard after the first deploy (Environment tab).
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Until a real Stripe key is added, payments run in mock mode.
      - key: ALLOW_MOCK_PAYMENTS
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: omr
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_SMS_FROM
        sync: false
