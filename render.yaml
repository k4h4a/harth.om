# No `databases:` block — using a free Neon Postgres instance instead of
# Render's paid Postgres plans. Set DATABASE_URL manually in the Render
# dashboard (Environment tab) to your Neon connection string.
services:
  - type: web
    name: harth-web
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      # Set this in the Render dashboard to your Neon connection string
      # (includes ?sslmode=require, so DB_SSL below is not needed).
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      # Set these in the Render dashboard after the first deploy (Environment tab).
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Until a real Stripe key is added, payments run in mock mode.
      - key: ALLOW_MOCK_PAYMENTS
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: omr
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # Order/rental WhatsApp notifications only — not account verification.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: REGISTRATION_OTP_EXPIRY_MINUTES
        value: "5"
      - key: REGISTRATION_OTP_MAX_ATTEMPTS
        value: "5"
      - key: PENDING_REGISTRATION_TTL_MINUTES
        value: "30"
