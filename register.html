<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Already logged in? Bounce straight to the right landing page instead
      // of flashing the login form. Runs before anything else renders.
      // Skipped if we're mid-way through a Google redirect (token/error still
      // in the URL) so that flow gets to finish processing first.
      (function () {
        try {
          var midGoogleRedirect =
            /(?:^|[#&])g_token=/.test(window.location.hash) ||
            /[?&]g_error=/.test(window.location.search);
          if (midGoogleRedirect) return;

          var token = localStorage.getItem("token");
          var user = JSON.parse(localStorage.getItem("user") || "null");
          if (token && user && user.id) {
            var landing =
              user.account_status === "pending"
                ? "tools.html"
                : ({
                    admin: "admin-dashboard.html",
                    owner: "owner-dashboard.html",
                    delivery: "delivery.html",
                    renter: "basket.html",
                  }[user.role] || "index.html");
            window.location.replace(landing);
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          if (localStorage.getItem("harth_lang") === "en") {
            document.documentElement.lang = "en";
            document.documentElement.dir = "ltr";
          }
        } catch (e) {}
        document.documentElement.classList.add("i18n-loading");
      })();
    </script>
    <style>
      html.i18n-loading body { visibility: hidden; }
    </style>
    <title data-i18n="register.title">تسجيل الدخول | منصة حرث</title>
    <link rel="stylesheet" href="design-system.css" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      .form-msg {
        min-height: 22px;
        margin: 10px 0;
        padding: 8px;
        border-radius: 6px;
        text-align: center;
        font-size: 14px;
      }
      .form-msg.err {
        background: rgba(192, 57, 43, 0.25);
        color: #ffb3b3;
      }
      .form-msg.ok {
        background: rgba(106, 176, 76, 0.25);
        color: #a9dc98;
      }
      .form-msg:empty { display: none; }
      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .otp-input {
        width: 100%;
        padding: 14px 18px;
        font-size: 28px;
        text-align: center;
        letter-spacing: 0.5em;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        direction: ltr;
        background: rgba(255, 255, 255, 0.95);
        color: #1a1a1a;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }
      .otp-help {
        font-size: 13px;
        color: #ccc;
        margin: 8px 0 14px;
        text-align: center;
      }
      .otp-resend {
        background: none;
        border: none;
        color: #6ab04c;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        text-decoration: underline;
        padding: 0;
      }
      .otp-resend:disabled {
        color: #888;
        cursor: not-allowed;
        text-decoration: none;
      }

      #reg-governorate {
        background: rgba(20, 40, 15, 0.95) !important;
        color: #ffffff !important;
      }
      #reg-governorate option {
        background: #1a2e10;
        color: #ffffff;
        padding: 6px 10px;
      }
      #reg-governorate option:checked,
      #reg-governorate option:hover {
        background: #2d5016;
        color: #ffffff;
      }

      /* ===== SOCIAL LOGIN ===== */
      .social-login-wrap {
        margin: 18px 0 16px;
        text-align: center;
      }
      .social-login-wrap .social-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 14px 0 10px;
      }
      .social-login-wrap .social-divider hr {
        flex: 1;
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .social-login-wrap .social-divider span {
        color: rgba(255, 255, 255, 0.3);
        font-size: 12px;
        white-space: nowrap;
      }
      .social-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 22px;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
        min-width: 130px;
        border: 1px solid transparent;
        cursor: pointer;
      }
      .social-btn.google {
        background: #ffffff;
        color: #333333;
        border-color: #ddd;
      }
      .social-btn.google:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        transform: translateY(-1px);
      }
      .social-btn.apple {
        background: #000000;
        color: #ffffff;
        border-color: #444;
      }
      .social-btn.apple:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        transform: translateY(-1px);
      }
      .social-btn i { font-size: 18px; }
      .social-btn svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }

      /* ===== RESPONSIVE FIXES ===== */
      @media (max-width: 600px) {
        .social-login-wrap .social-divider {
          gap: 8px;
        }
        .social-btn {
          min-width: 100px;
          padding: 8px 12px;
          font-size: 12px;
        }
        .social-btn svg {
          width: 16px;
          height: 16px;
        }
        .social-btn i {
          font-size: 16px;
        }
        .radio-group label {
          font-size: 13px;
          padding: 8px !important;
        }
        .login-card {
          padding: 20px 16px !important;
        }
        .input-field input {
          font-size: 14px !important;
          padding: 10px 12px !important;
        }
        .login-btn {
          font-size: 15px !important;
          padding: 12px !important;
        }
      }
      @media (max-width: 400px) {
        .social-btn {
          min-width: 80px;
          padding: 6px 10px;
          font-size: 11px;
        }
        .social-btn svg {
          width: 14px;
          height: 14px;
        }
        .social-btn i {
          font-size: 14px;
        }
        .login-card h2 {
          font-size: 20px !important;
        }
        .login-card h3 {
          font-size: 18px !important;
        }
      }
    </style>
  
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="logo-area">
          <h2 data-i18n="register.logoText">مَنْصَةُ حَرْثْ</h2>
        </div>

        <!-- ============================================ -->
        <!-- SOCIAL LOGIN - Google & Apple                -->
        <!-- ============================================ -->
        <div class="social-login-wrap">
          <p style="color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 12px;" data-i18n="register.socialLoginTitle">
            أو سجل دخول باستخدام
          </p>
          <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
            <!-- Google Button -->
            <a href="/api/v1/auth/google" class="social-btn google">
              <svg viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
              </svg>
              <span data-i18n="register.googleBtn">Google</span>
            </a>

            <!-- Apple Button -->
            <a href="/api/v1/auth/apple" class="social-btn apple">
              <i class="fab fa-apple"></i>
              <span data-i18n="register.appleBtn">Apple</span>
            </a>
          </div>

          <div class="social-divider">
            <hr />
            <span data-i18n="register.socialDivider">أو</span>
            <hr />
          </div>
        </div>

        <h3 id="page-title" data-i18n="register.login.title">تسجيل الدخول</h3>
        <p id="page-sub" data-i18n="register.login.subtitle">مرحباً بك مجدداً في مجتمعنا الزراعي</p>

        <!-- LOGIN FORM -->
        <form id="loginForm">
          <div class="input-field">
            <input
              type="email"
              id="login-email"
              placeholder="البريد الإلكتروني"
              data-i18n-placeholder="register.login.emailPlaceholder"
              required
              autocomplete="email"
            />
          </div>
          <div class="input-field">
            <input
              type="password"
              id="login-password"
              placeholder="كلمة المرور"
              data-i18n-placeholder="register.login.passwordPlaceholder"
              required
              autocomplete="current-password"
            />
          </div>
          <div id="login-msg" class="form-msg"></div>
          <button type="submit" class="login-btn" id="login-btn" data-i18n="register.login.submitBtn">
            تسجيل الدخول
          </button>
        </form>
      </div>
    </div>

    <div class="top-navigation">
      <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-right"></i> <span data-i18n="register.backBtn">التراجع</span>
      </a>
    </div>

    <script src="i18n.js"></script>
    <script src="lang-switcher.js"></script>
    <script src="design-system.js"></script>
    <script src="script.js"></script>
    <script>
      // =========================================================
      // register.html — sign-in only. New accounts are created
      // exclusively via "Sign in with Google"; email/password here
      // only logs into an account that already exists.
      // =========================================================
      (function () {
        "use strict";

        const $ = (s) => document.querySelector(s);

        function t(key, vars) {
          return window.HarthI18n ? window.HarthI18n.t(key, vars) : key;
        }

        function showMsg(el, text, isError = false) {
          const box = $(el);
          box.textContent = text;
          box.className = "form-msg " + (isError ? "err" : "ok");
        }

        function landingFor(user) {
          if (user.account_status === "pending") return "tools.html";
          return (
            {
              admin: "admin-dashboard.html",
              owner: "owner-dashboard.html",
              delivery: "delivery.html",
              renter: "basket.html",
            }[user.role] || "index.html"
          );
        }

        // ─── Google OAuth: pick up the result of a redirect round-trip ──
        // Success: the backend redirects to /register.html#g_token=<jwt>.
        // Failure: /register.html?g_error=<code>. Fragment (not query) is
        // used for the token so it never lingers in server logs/Referer.
        async function handleGoogleCallbackToken() {
          const match = /(?:^|[#&])g_token=([^&]+)/.exec(window.location.hash);
          if (!match) return false;

          // Strip it from the URL immediately so a refresh/back-navigation
          // can't re-process (or re-expose) the token.
          history.replaceState(
            null,
            "",
            window.location.pathname + window.location.search,
          );

          const token = decodeURIComponent(match[1]);
          showMsg("#login-msg", t("register.google.connecting"));
          localStorage.setItem("token", token);
          try {
            const res = await apiFetch("/auth/me");
            if (!res || !res.success) throw new Error();
            localStorage.setItem("user", JSON.stringify(res.user));
            window.location.replace(landingFor(res.user));
          } catch (err) {
            localStorage.removeItem("token");
            showMsg("#login-msg", t("register.google.failed"), true);
          }
          return true;
        }

        function handleGoogleCallbackError() {
          const params = new URLSearchParams(window.location.search);
          const code = params.get("g_error");
          if (!code) return;
          history.replaceState(null, "", window.location.pathname);

          const messages = {
            access_denied: t("register.google.denied"),
            account_disabled: t("register.google.accountDisabled"),
          };
          showMsg(
            "#login-msg",
            messages[code] || t("register.google.failed"),
            true,
          );
        }

        handleGoogleCallbackToken().then((handled) => {
          if (!handled) handleGoogleCallbackError();
        });

        // Plain <a href> navigation to the backend — can't preventDefault,
        // just show a loading state while the browser leaves the page.
        const googleBtn = document.querySelector(".social-btn.google");
        if (googleBtn) {
          googleBtn.addEventListener("click", function () {
            this.style.pointerEvents = "none";
            this.style.opacity = "0.7";
            const label = this.querySelector("span");
            if (label) label.textContent = t("register.google.connecting");
          });
        }

        // ─── Login (only way in with email/password — account must
        // already exist; new accounts are created via Google only) ──────
        $("#loginForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = $("#login-email").value.trim();
          const password = $("#login-password").value;
          const btn = $("#login-btn");

          btn.disabled = true;
          btn.textContent = t("register.login.submitBtnLoading");
          showMsg("#login-msg", "");

          try {
            const res = await apiFetch("/auth/login", {
              method: "POST",
              body: JSON.stringify({ email, password }),
            });
            if (!res || !res.success) {
              throw new Error(
                (res && res.error && res.error.message) || t("register.login.failed"),
              );
            }
            localStorage.setItem("token", res.token);
            localStorage.setItem("user", JSON.stringify(res.user));
            showMsg("#login-msg", t("register.login.success"));
            setTimeout(() => {
              window.location.href = landingFor(res.user);
            }, 700);
          } catch (err) {
            showMsg("#login-msg", err.message || t("register.login.genericError"), true);
            btn.disabled = false;
            btn.textContent = t("register.login.submitBtn");
          }
        });
      })();
    </script>
  
    <script src="responsive.js" defer></script>
  </body>
</html>
