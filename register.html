<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("harth_lang") === "en") {
            document.documentElement.lang = "en";
            document.documentElement.dir = "ltr";
          }
        } catch (e) {}
        document.documentElement.classList.add("i18n-loading");
      })();
    </script>
    <style>
      html.i18n-loading body { visibility: hidden; }
    </style>
    <title data-i18n="register.title">تسجيل الدخول | منصة حرث</title>
    <link rel="stylesheet" href="design-system.css" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      .form-msg {
        min-height: 22px;
        margin: 10px 0;
        padding: 8px;
        border-radius: 6px;
        text-align: center;
        font-size: 14px;
      }
      .form-msg.err {
        background: rgba(192, 57, 43, 0.25);
        color: #ffb3b3;
      }
      .form-msg.ok {
        background: rgba(106, 176, 76, 0.25);
        color: #a9dc98;
      }
      .form-msg:empty { display: none; }
      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .otp-input {
        width: 100%;
        padding: 14px 18px;
        font-size: 28px;
        text-align: center;
        letter-spacing: 0.5em;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        direction: ltr;
        background: rgba(255, 255, 255, 0.95);
        color: #1a1a1a;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }
      .otp-help {
        font-size: 13px;
        color: #ccc;
        margin: 8px 0 14px;
        text-align: center;
      }
      .otp-resend {
        background: none;
        border: none;
        color: #6ab04c;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        text-decoration: underline;
        padding: 0;
      }
      .otp-resend:disabled {
        color: #888;
        cursor: not-allowed;
        text-decoration: none;
      }

      #reg-governorate {
        background: rgba(20, 40, 15, 0.95) !important;
        color: #ffffff !important;
      }
      #reg-governorate option {
        background: #1a2e10;
        color: #ffffff;
        padding: 6px 10px;
      }
      #reg-governorate option:checked,
      #reg-governorate option:hover {
        background: #2d5016;
        color: #ffffff;
      }

      /* ===== SOCIAL LOGIN ===== */
      .social-login-wrap {
        margin: 18px 0 16px;
        text-align: center;
      }
      .social-login-wrap .social-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 14px 0 10px;
      }
      .social-login-wrap .social-divider hr {
        flex: 1;
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .social-login-wrap .social-divider span {
        color: rgba(255, 255, 255, 0.3);
        font-size: 12px;
        white-space: nowrap;
      }
      .social-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 22px;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
        min-width: 130px;
        border: 1px solid transparent;
        cursor: pointer;
      }
      .social-btn.google {
        background: #ffffff;
        color: #333333;
        border-color: #ddd;
      }
      .social-btn.google:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        transform: translateY(-1px);
      }
      .social-btn.apple {
        background: #000000;
        color: #ffffff;
        border-color: #444;
      }
      .social-btn.apple:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        transform: translateY(-1px);
      }
      .social-btn i { font-size: 18px; }
      .social-btn svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }

      /* ===== RESPONSIVE FIXES ===== */
      @media (max-width: 600px) {
        .social-login-wrap .social-divider {
          gap: 8px;
        }
        .social-btn {
          min-width: 100px;
          padding: 8px 12px;
          font-size: 12px;
        }
        .social-btn svg {
          width: 16px;
          height: 16px;
        }
        .social-btn i {
          font-size: 16px;
        }
        .radio-group label {
          font-size: 13px;
          padding: 8px !important;
        }
        .login-card {
          padding: 20px 16px !important;
        }
        .input-field input {
          font-size: 14px !important;
          padding: 10px 12px !important;
        }
        .login-btn {
          font-size: 15px !important;
          padding: 12px !important;
        }
      }
      @media (max-width: 400px) {
        .social-btn {
          min-width: 80px;
          padding: 6px 10px;
          font-size: 11px;
        }
        .social-btn svg {
          width: 14px;
          height: 14px;
        }
        .social-btn i {
          font-size: 14px;
        }
        .login-card h2 {
          font-size: 20px !important;
        }
        .login-card h3 {
          font-size: 18px !important;
        }
      }
    </style>
  
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="logo-area">
          <h2 data-i18n="register.logoText">مَنْصَةُ حَرْثْ</h2>
        </div>

        <!-- ============================================ -->
        <!-- SOCIAL LOGIN - Google & Apple                -->
        <!-- ============================================ -->
        <div class="social-login-wrap">
          <p style="color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 12px;" data-i18n="register.socialLoginTitle">
            أو سجل دخول باستخدام
          </p>
          <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
            <!-- Google Button -->
            <a href="/api/v1/auth/google" class="social-btn google">
              <svg viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
              </svg>
              <span data-i18n="register.googleBtn">Google</span>
            </a>

            <!-- Apple Button -->
            <a href="/api/v1/auth/apple" class="social-btn apple">
              <i class="fab fa-apple"></i>
              <span data-i18n="register.appleBtn">Apple</span>
            </a>
          </div>

          <div class="social-divider">
            <hr />
            <span data-i18n="register.socialDivider">أو</span>
            <hr />
          </div>
        </div>

        <h3 id="page-title" data-i18n="register.login.title">تسجيل الدخول</h3>
        <p id="page-sub" data-i18n="register.login.subtitle">مرحباً بك مجدداً في مجتمعنا الزراعي</p>

        <!-- LOGIN FORM -->
        <form id="loginForm">
          <div class="input-field">
            <input
              type="email"
              id="login-email"
              placeholder="البريد الإلكتروني"
              data-i18n-placeholder="register.login.emailPlaceholder"
              required
              autocomplete="email"
            />
          </div>
          <div class="input-field">
            <input
              type="password"
              id="login-password"
              placeholder="كلمة المرور"
              data-i18n-placeholder="register.login.passwordPlaceholder"
              required
              autocomplete="current-password"
            />
          </div>
          <div id="login-msg" class="form-msg"></div>
          <button type="submit" class="login-btn" id="login-btn" data-i18n="register.login.submitBtn">
            تسجيل الدخول
          </button>
        </form>

        <!-- REGISTER FORM -->
        <div
          id="createAccountSection"
          style="
            display: none;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 2px solid rgba(255, 255, 255, 0.15);
          "
        >
          <h4 style="color: #6ab04c; margin-bottom: 20px" data-i18n="register.form.heading">إنشاء حساب جديد</h4>
          <form id="registerForm">
            <div class="input-field">
              <input type="text" id="reg-name" placeholder="الاسم الكامل" data-i18n-placeholder="register.form.namePlaceholder" required />
            </div>
            <div class="input-field">
              <input
                type="email"
                id="reg-email"
                placeholder="البريد الإلكتروني"
                data-i18n-placeholder="register.login.emailPlaceholder"
                required
                autocomplete="email"
              />
            </div>
            <div class="input-field">
              <input
                type="password"
                id="reg-password"
                placeholder="كلمة المرور (8 أحرف أو أكثر)"
                data-i18n-placeholder="register.form.passwordPlaceholder"
                minlength="8"
                required
                autocomplete="new-password"
              />
            </div>
            <div class="input-field">
              <input type="text" id="reg-identity" placeholder="رقم الهوية (اختياري)" data-i18n-placeholder="register.form.identityPlaceholder" />
            </div>
            <div class="input-field">
              <input
                type="tel"
                id="reg-phone"
                placeholder="رقم الهاتف (مثال: +96899999999)"
                data-i18n-placeholder="register.form.phonePlaceholder"
                required
                autocomplete="tel"
              />
            </div>
            <div class="input-field">
              <select
                id="reg-governorate"
                style="
                  width: 100%;
                  padding: 12px 15px;
                  border-radius: 10px;
                  border: 1px solid rgba(255, 255, 255, 0.2);
                  background: rgba(255, 255, 255, 0.1);
                  color: #fff;
                  font-family: inherit;
                  font-size: 14px;
                "
              >
                <option value="" data-i18n="register.form.governoratePlaceholder">اختر المحافظة (اختياري)</option>
                <option value="muscat" data-i18n="common.governorates.muscat">مسقط</option>
                <option value="dhofar" data-i18n="common.governorates.dhofar">ظفار</option>
                <option value="musandam" data-i18n="common.governorates.musandam">مسندم</option>
                <option value="buraimi" data-i18n="common.governorates.buraimi">البريمي</option>
                <option value="dakhiliyah" data-i18n="common.governorates.dakhiliyah">الداخلية</option>
                <option value="north_batinah" data-i18n="common.governorates.north_batinah">شمال الباطنة</option>
                <option value="south_batinah" data-i18n="common.governorates.south_batinah">جنوب الباطنة</option>
                <option value="south_sharqiyah" data-i18n="common.governorates.south_sharqiyah">جنوب الشرقية</option>
                <option value="north_sharqiyah" data-i18n="common.governorates.north_sharqiyah">شمال الشرقية</option>
                <option value="dhahirah" data-i18n="common.governorates.dhahirah">الظاهرة</option>
                <option value="wusta" data-i18n="common.governorates.wusta">الوسطى</option>
              </select>
            </div>

            <label
              style="
                color: #fff;
                font-weight: 700;
                display: block;
                margin: 12px 0 8px;
              "
              data-i18n="register.form.accountTypeLabel"
              >نوع الحساب:</label
            >
            <div
              class="radio-group"
              style="display: flex; flex-direction: column; gap: 8px"
            >
              <label
                class="radio-container"
                style="
                  background: rgba(255, 255, 255, 0.05);
                  padding: 10px;
                  border-radius: 8px;
                  border: 1px solid rgba(255, 255, 255, 0.1);
                "
              >
                <input type="radio" name="role" value="renter" checked />
                <span class="checkmark"></span>
                <strong data-i18n="register.form.roles.renter.label">مستهلك</strong>
                <div
                  style="
                    font-size: 12px;
                    color: #ccc;
                    margin-top: 4px;
                    font-weight: 400;
                  "
                  data-i18n="register.form.roles.renter.desc"
                >
                  تصفّح وشراء المنتجات والمعدات. تفعيل فوري.
                </div>
              </label>

              <label
                class="radio-container"
                style="
                  background: rgba(255, 255, 255, 0.05);
                  padding: 10px;
                  border-radius: 8px;
                  border: 1px solid rgba(255, 255, 255, 0.1);
                "
              >
                <input type="radio" name="role" value="owner" />
                <span class="checkmark"></span>
                <strong data-i18n="register.form.roles.owner.label">مزارع</strong>
                <div
                  style="
                    font-size: 12px;
                    color: #ccc;
                    margin-top: 4px;
                    font-weight: 400;
                  "
                >
                  <span data-i18n="register.form.roles.owner.desc">عرض منتجاتك ومعداتك للبيع أو للإيجار، إضافةً إلى الشراء.</span>
                  <br /><span style="color: #f1c40f" data-i18n="register.form.roles.owner.note"
                    >يتطلّب الحساب موافقة الإدارة قبل تفعيل صلاحية البيع/التأجير.</span
                  >
                </div>
              </label>

              <label
                class="radio-container"
                style="
                  background: rgba(255, 255, 255, 0.05);
                  padding: 10px;
                  border-radius: 8px;
                  border: 1px solid rgba(255, 255, 255, 0.1);
                "
              >
                <input type="radio" name="role" value="delivery" />
                <span class="checkmark"></span>
                <strong data-i18n="register.form.roles.delivery.label">مندوب توصيل</strong>
                <div
                  style="
                    font-size: 12px;
                    color: #ccc;
                    margin-top: 4px;
                    font-weight: 400;
                  "
                >
                  <span data-i18n="register.form.roles.delivery.desc">قبول وتنفيذ طلبات التوصيل، إضافةً إلى الشراء.</span>
                  <br /><span style="color: #f1c40f" data-i18n="register.form.roles.delivery.note"
                    >يتطلّب الحساب موافقة الإدارة قبل قبول طلبات التوصيل.</span
                  >
                </div>
              </label>
            </div>

            <div id="register-msg" class="form-msg"></div>
            <button
              type="submit"
              id="register-btn"
              class="login-btn"
              style="background: #6ab04c; margin-top: 10px"
              data-i18n="register.form.submitBtn"
            >
              إنشاء الحساب
            </button>
          </form>
        </div>

        <!-- OTP STEP — phone verification, required to finish registration -->
        <div id="otpSection" style="display: none; margin-top: 20px">
          <h4 style="color: #6ab04c; margin-bottom: 8px; text-align: center">
            <i class="fas fa-shield-alt"></i> <span data-i18n="register.otp.heading">تأكيد رقم الهاتف</span>
          </h4>
          <p class="otp-help">
            <span data-i18n="register.otp.helpText">أرسلنا رمزاً إلى</span>
            <strong id="otp-phone-label" style="color: #fff"></strong>.
            <span id="otp-help-suffix"></span>
          </p>
          <form id="otpForm">
            <input
              type="text"
              id="otp-code"
              class="otp-input"
              inputmode="numeric"
              autocomplete="one-time-code"
              maxlength="6"
              pattern="\d{4,6}"
              required
              placeholder="------"
            />
            <div id="otp-msg" class="form-msg"></div>
            <button type="submit" class="login-btn" id="otp-submit-btn" data-i18n="register.otp.confirmBtn">
              تأكيد
            </button>
            <p style="margin-top: 14px; text-align: center; font-size: 13px">
              <span data-i18n="register.otp.resendQuestion">لم يصلك الرمز؟</span>
              <button
                type="button"
                id="otp-resend-btn"
                class="otp-resend"
                disabled
                data-i18n="register.otp.resendBtn"
              >
                إعادة الإرسال
              </button>
              <span id="otp-resend-timer" style="color: #888"></span>
            </p>
          </form>
        </div>

        <p
          id="toggle-row"
          style="
            font-size: 14px;
            color: #dcdde1;
            margin-top: 40px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
          "
        >
          <span id="toggle-text" data-i18n="register.toggle.noAccountText">ليس لديك حساب؟</span>
          <a
            href="#"
            id="toggle-mode"
            style="color: #6ab04c; font-weight: bold"
            data-i18n="register.toggle.createAccountLink"
            >إنشاء حساب جديد</a
          >
        </p>
      </div>
    </div>

    <div class="top-navigation">
      <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-right"></i> <span data-i18n="register.backBtn">التراجع</span>
      </a>
    </div>

    <script src="i18n.js"></script>
    <script src="lang-switcher.js"></script>
    <script src="design-system.js"></script>
    <script src="script.js"></script>
    <script>
      // =========================================================
      // register.html — login + register + phone-verification OTP.
      // Roles sent to backend: renter | owner | delivery
      // =========================================================
      (function () {
        "use strict";

        const $ = (s) => document.querySelector(s);

        function t(key, vars) {
          return window.HarthI18n ? window.HarthI18n.t(key, vars) : key;
        }

        function showMsg(el, text, isError = false) {
          const box = $(el);
          box.textContent = text;
          box.className = "form-msg " + (isError ? "err" : "ok");
        }

        function landingFor(user) {
          if (user.account_status === "pending") return "tools.html";
          return (
            {
              admin: "admin-dashboard.html",
              owner: "owner-dashboard.html",
              delivery: "delivery.html",
              renter: "basket.html",
            }[user.role] || "index.html"
          );
        }

        let mode = "login";

        function setMode(next) {
          mode = next;
          $("#loginForm").style.display = mode === "login" ? "block" : "none";
          $("#createAccountSection").style.display =
            mode === "register" ? "block" : "none";
          $("#otpSection").style.display = mode === "otp" ? "block" : "none";
          $("#toggle-row").style.display = mode === "otp" ? "none" : "block";

          if (mode === "login") {
            $("#page-title").textContent = t("register.login.title");
            $("#page-sub").textContent = t("register.login.subtitle");
            $("#toggle-text").textContent = t("register.toggle.noAccountText");
            $("#toggle-mode").textContent = t("register.toggle.createAccountLink");
          } else if (mode === "register") {
            $("#page-title").textContent = t("register.form.heading");
            $("#page-sub").textContent = t("register.form.subtitle");
            $("#toggle-text").textContent = t("register.toggle.haveAccountText");
            $("#toggle-mode").textContent = t("register.toggle.loginLink");
          } else if (mode === "otp") {
            $("#page-title").textContent = t("register.otp.title");
            $("#page-sub").textContent = t("register.otp.subtitle");
          }
        }

        $("#toggle-mode").addEventListener("click", (e) => {
          e.preventDefault();
          setMode(mode === "login" ? "register" : "login");
        });

        // ─── Login ──────────────────────────────────────────────────
        $("#loginForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = $("#login-email").value.trim();
          const password = $("#login-password").value;
          const btn = $("#login-btn");

          btn.disabled = true;
          btn.textContent = t("register.login.submitBtnLoading");
          showMsg("#login-msg", "");

          try {
            const res = await apiFetch("/auth/login", {
              method: "POST",
              body: JSON.stringify({ email, password }),
            });
            if (!res || !res.success) {
              throw new Error(
                (res && res.error && res.error.message) || t("register.login.failed"),
              );
            }
            localStorage.setItem("token", res.token);
            localStorage.setItem("user", JSON.stringify(res.user));
            showMsg("#login-msg", t("register.login.success"));
            setTimeout(() => {
              window.location.href = landingFor(res.user);
            }, 700);
          } catch (err) {
            showMsg("#login-msg", err.message || t("register.login.genericError"), true);
            btn.disabled = false;
            btn.textContent = t("register.login.submitBtn");
          }
        });

        // ─── Register (step 1: submit data, send phone OTP) ─────────
        // Pending state carried from the register submit into the OTP step.
        let pendingRegistrationId = null;
        let pendingOtpMinutes = 5;
        let resendCooldownTimer = null;

        $("#registerForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const name = $("#reg-name").value.trim();
          const email = $("#reg-email").value.trim();
          const password = $("#reg-password").value;
          const identity = $("#reg-identity").value.trim();
          const phone = $("#reg-phone").value.trim();
          const governorate = $("#reg-governorate").value;
          const role = document.querySelector(
            'input[name="role"]:checked',
          ).value;
          const btn = $("#register-btn");

          if (password.length < 8) {
            showMsg("#register-msg", t("register.form.passwordTooShort"), true);
            return;
          }
          if (!phone) {
            showMsg("#register-msg", t("register.form.phonePlaceholder"), true);
            return;
          }

          btn.disabled = true;
          btn.textContent = t("register.form.submitBtnLoading");
          showMsg("#register-msg", "");

          const body = { email, password, name, role, phone };
          if (identity) body.identity = identity;
          if (governorate) body.governorate = governorate;

          try {
            const res = await apiFetch("/auth/register/init", {
              method: "POST",
              body: JSON.stringify(body),
            });
            if (!res || !res.success) {
              throw new Error(
                (res && res.error && res.error.message) || t("register.otp.initFailed"),
              );
            }
            pendingRegistrationId = res.pending_registration_id;
            pendingOtpMinutes = Math.round((new Date(res.expires_at) - Date.now()) / 60000) || 5;

            const codeLen = res.otp_length || 6;
            const otpInput = $("#otp-code");
            otpInput.maxLength = codeLen;
            otpInput.pattern = `\\d{${codeLen}}`;
            otpInput.value = "";

            $("#otp-phone-label").textContent = phone;
            $("#otp-help-suffix").textContent = t("register.otp.helpTextSuffix", {
              minutes: pendingOtpMinutes,
            });
            showMsg("#otp-msg", "");
            setMode("otp");
            startResendCooldown();
          } catch (err) {
            showMsg("#register-msg", err.message || t("register.login.genericError"), true);
          } finally {
            btn.disabled = false;
            btn.textContent = t("register.form.submitBtn");
          }
        });

        // ─── OTP (step 2: verify phone code, account gets created) ──
        $("#otpForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const code = $("#otp-code").value.trim();
          const btn = $("#otp-submit-btn");

          btn.disabled = true;
          showMsg("#otp-msg", "");

          try {
            const res = await apiFetch("/auth/register/verify", {
              method: "POST",
              body: JSON.stringify({
                pending_registration_id: pendingRegistrationId,
                code,
              }),
            });
            if (!res || !res.success) {
              throw new Error(
                (res && res.error && res.error.message) || t("register.otp.verifyFailed"),
              );
            }
            localStorage.setItem("token", res.token);
            localStorage.setItem("user", JSON.stringify(res.user));
            showMsg("#otp-msg", t("register.form.successMsg"));
            setTimeout(() => {
              window.location.href = landingFor(res.user);
            }, 1000);
          } catch (err) {
            showMsg("#otp-msg", err.message || t("register.otp.verifyFailed"), true);
            btn.disabled = false;
          }
        });

        $("#otp-resend-btn").addEventListener("click", async () => {
          const btn = $("#otp-resend-btn");
          btn.disabled = true;
          try {
            const res = await apiFetch("/auth/register/resend", {
              method: "POST",
              body: JSON.stringify({ pending_registration_id: pendingRegistrationId }),
            });
            if (!res || !res.success) {
              throw new Error(
                (res && res.error && res.error.message) || t("register.otp.resendFailed"),
              );
            }
            showMsg("#otp-msg", t("register.otp.resendBtn"));
            startResendCooldown();
          } catch (err) {
            showMsg("#otp-msg", err.message || t("register.otp.resendFailed"), true);
            btn.disabled = false;
          }
        });

        function startResendCooldown(seconds = 60) {
          const btn = $("#otp-resend-btn");
          const timerEl = $("#otp-resend-timer");
          btn.disabled = true;
          let remaining = seconds;
          if (resendCooldownTimer) clearInterval(resendCooldownTimer);
          timerEl.textContent = t("register.otp.resendWait", { seconds: remaining });
          resendCooldownTimer = setInterval(() => {
            remaining -= 1;
            if (remaining <= 0) {
              clearInterval(resendCooldownTimer);
              resendCooldownTimer = null;
              timerEl.textContent = "";
              btn.disabled = false;
            } else {
              timerEl.textContent = t("register.otp.resendWait", { seconds: remaining });
            }
          }, 1000);
        }
      })();
    </script>
  
    <script src="responsive.js" defer></script>
  </body>
</html>
