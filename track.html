<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("harth_lang") === "en") {
            document.documentElement.lang = "en";
            document.documentElement.dir = "ltr";
          }
        } catch (e) {}
        document.documentElement.classList.add("i18n-loading");
      })();
    </script>
    <style>
      html.i18n-loading body { visibility: hidden; }
    </style>
    <title data-i18n="track.title">تتبع الطلب - حرث</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="design-system.css" />
    <link rel="stylesheet" href="style.css" />

    <style>
      .track-wrap { max-width: 700px; margin: 40px auto; padding: 0 20px; }
      .track-card {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 30px;
        margin-bottom: 20px;
      }
      @media (max-width: 480px) {
        .track-wrap { padding: 0 12px; }
        .track-card { padding: 16px; }
      }
      .track-title {
        font-size: 28px; color: #6ab04c;
        margin-bottom: 8px; text-align: center;
      }
      .track-subtitle { color: #ddd; text-align: center; margin-bottom: 24px; }

      .search-form { display: flex; gap: 10px; margin-bottom: 24px; }
      .search-form input {
        flex: 1;
        padding: 14px 18px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        border-radius: 10px;
        font-family: inherit;
        font-size: 16px;
        text-align: center;
        letter-spacing: 1px;
      }
      .search-form input::placeholder { color: rgba(255, 255, 255, 0.5); }
      .search-form input:focus { outline: none; border-color: #6ab04c; }
      .search-form button {
        padding: 14px 24px;
        background: #6ab04c;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
        font-family: inherit;
        font-size: 16px;
      }

      .status-banner {
        padding: 20px; border-radius: 14px;
        text-align: center; margin-bottom: 20px;
      }
      .status-banner .icon { font-size: 56px; margin-bottom: 10px; }
      .status-banner .status-text { font-size: 22px; font-weight: 700; }
      .status-banner.pending {
        background: rgba(241, 196, 15, 0.2);
        border: 2px solid #f1c40f;
      }
      .status-banner.pending .icon { color: #f1c40f; }
      .status-banner.assigned {
        background: rgba(52, 152, 219, 0.2);
        border: 2px solid #3498db;
      }
      .status-banner.assigned .icon { color: #3498db; }
      .status-banner.delivered {
        background: rgba(106, 176, 76, 0.2);
        border: 2px solid #6ab04c;
      }
      .status-banner.delivered .icon { color: #6ab04c; }
      .status-banner.cancelled {
        background: rgba(231, 76, 60, 0.2);
        border: 2px solid #e74c3c;
      }
      .status-banner.cancelled .icon { color: #e74c3c; }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 20px;
      }
      @media (max-width: 600px) {
        .info-grid { grid-template-columns: 1fr; }
      }
      .info-item {
        background: rgba(0, 0, 0, 0.2);
        padding: 14px;
        border-radius: 10px;
      }
      .info-item .label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
      .info-item .value { font-size: 15px; color: #fff; font-weight: 600; }

      .courier-card {
        background: linear-gradient(135deg, rgba(52, 152, 219, 0.25), rgba(52, 152, 219, 0.1));
        border: 2px solid #3498db;
        border-radius: 14px;
        padding: 18px;
        margin-top: 16px;
      }
      .courier-card h4 { color: #3498db; font-size: 14px; margin-bottom: 10px; }
      .courier-row {
        display: flex; align-items: center; gap: 12px; padding: 8px 0;
      }
      .courier-row i {
        font-size: 22px; color: #3498db;
        width: 32px; text-align: center;
      }

      .timeline {
        margin-top: 24px;
        padding: 16px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
      }
      .timeline-item {
        display: flex; gap: 12px; padding: 10px 0; position: relative;
      }
      .timeline-item::before {
        content: "";
        width: 12px; height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        margin-top: 6px;
        flex-shrink: 0;
      }
      .timeline-item.done::before { background: #6ab04c; }
      .timeline-item.current::before {
        background: #3498db;
        box-shadow: 0 0 10px #3498db;
      }
      .timeline-item .tl-text { font-size: 14px; }
      .timeline-item.done .tl-text { color: #a9dc98; }
      .timeline-item.current .tl-text { color: #a3d5ff; font-weight: 700; }
      .timeline-item.future .tl-text { color: #666; }

      /* ===== CHAT SECTION ===== */
      .chat-section {
        margin-top: 24px;
        padding: 16px;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .chat-section h4 {
        color: #f1c40f;
        font-size: 16px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .chat-messages {
        max-height: 240px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
        padding-inline-end: 4px;
      }
      .chat-messages::-webkit-scrollbar {
        width: 5px;
      }
      .chat-messages::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
      }
      .chat-messages::-webkit-scrollbar-thumb {
        background: #6ab04c;
        border-radius: 10px;
      }

      .chat-msg {
        padding: 10px 14px;
        border-radius: 12px;
        max-width: 80%;
        word-wrap: break-word;
        font-size: 14px;
        line-height: 1.5;
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .chat-msg.own {
        align-self: flex-end;
        background: rgba(106, 176, 76, 0.25);
        border-color: rgba(106, 176, 76, 0.3);
      }
      .chat-msg .sender {
        font-size: 11px;
        font-weight: 700;
        color: #6ab04c;
        margin-bottom: 2px;
        display: block;
      }
      .chat-msg .sender.courier { color: #3498db; }
      .chat-msg .sender.farmer { color: #f39c12; }
      .chat-msg .time {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 4px;
        display: block;
        text-align: end;
      }
      .chat-msg .system {
        color: #f1c40f;
        font-style: italic;
        background: rgba(241, 196, 15, 0.08);
        border-color: rgba(241, 196, 15, 0.15);
        text-align: center;
        max-width: 90%;
        align-self: center;
      }
      .chat-input-row {
        display: flex;
        gap: 8px;
      }
      .chat-input-row input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        border-radius: 8px;
        font-family: inherit;
        font-size: 14px;
      }
      .chat-input-row input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      .chat-input-row input:focus {
        outline: none;
        border-color: #6ab04c;
      }
      .chat-input-row button {
        padding: 10px 18px;
        background: #6ab04c;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        font-family: inherit;
        font-size: 14px;
        white-space: nowrap;
      }
      .chat-input-row button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .chat-empty {
        text-align: center;
        color: rgba(255, 255, 255, 0.3);
        font-size: 13px;
        padding: 20px 0;
      }

      .empty-hint {
        text-align: center; padding: 40px 20px; color: #aaa;
      }
      .empty-hint i {
        font-size: 60px; color: #6ab04c;
        display: block; margin-bottom: 16px;
      }

      .err-msg {
        text-align: center;
        padding: 20px;
        background: rgba(231, 76, 60, 0.2);
        border: 1px solid #e74c3c;
        border-radius: 10px;
        color: #ffb3b3;
      }
    </style>
  
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <header class="header-container">
      <div class="header-capsule">
        <div class="section right">
          <div class="site-brand">
            <img src="شعار حرث.jpeg" alt="Logo" />
            <h1>حــرث</h1>
          </div>
        </div>
        <nav class="section center">
          <ul class="nav-links">
            <li><a href="track.html" class="nav-item" data-i18n="nav.trackOrders">تتبع الطلبات</a></li>
            <li><a href="delivery.html" class="nav-item" data-i18n="nav.delivery">التوصيل</a></li>
            <li><a href="basket.html" class="nav-item" data-i18n="nav.sellEquipment">بيع المعدات</a></li>
            <li><a href="tools.html" class="nav-item" data-i18n="nav.rentEquipment">تأجير المعدات</a></li>
            <li><a href="index.html" class="nav-item" data-i18n="nav.home">الرئيسية</a></li>
          </ul>
        </nav>
        <div class="section left" id="auth-header">
          <a href="register.html" class="hs-btn hs-btn--ghost hs-btn--sm" id="login-link" data-i18n="common.buttons.login">تسجيل دخول</a>
        </div>
      </div>
    </header>

    <main>
      <div class="track-wrap">
        <div class="track-card">
          <h2 class="track-title">
            <i class="fas fa-search-location"></i> <span data-i18n="track.pageHeading">تتبع طلبك</span>
          </h2>
          <p class="track-subtitle" data-i18n="track.pageSubheading">
            أدخل رقم التتبع (الرقم التسلسلي الذي وصلك مع تأكيد الطلب)
          </p>

          <div class="search-form">
            <input
              type="text"
              id="tracking-input"
              data-i18n-placeholder="track.searchPlaceholder"
              placeholder="مثال: HRT-XXXXXXXX"
              autocomplete="off"
            />
            <button type="button" id="search-btn">
              <i class="fas fa-search"></i> <span data-i18n="track.searchBtn">بحث</span>
            </button>
          </div>

          <div id="result">
            <div class="empty-hint">
              <i class="fas fa-box"></i>
              <p data-i18n="track.emptyHintTitle">أدخل رقم التتبع أعلاه للاطلاع على حالة طلبك.</p>
              <p style="font-size: 13px; margin-top: 10px; color: #888" data-i18n="track.emptyHintFormat">
                رقم التتبع يبدأ بـ HRT- ويتكوّن من 8 أحرف وأرقام
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="team-logo-container">
        <img src="شعار حرث.jpeg" class="team-img" />
      </div>
      <div class="footer-bottom">
        <p data-i18n="home.footer.rights">&copy; 2026 جميع الحقوق محفوظة لفريق حرث</p>
      </div>
    </footer>

    <script src="i18n.js"></script>
    <script src="lang-switcher.js"></script>
    <script src="design-system.js"></script>
    <script src="unified-nav.js"></script>
    <script src="script.js"></script>
    <script>
      // =================================================================
      // track.html — public order lookup + CHAT between customer, courier & farmer
      // =================================================================
      (function () {
        "use strict";

        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        function t(key, vars) {
          return window.HarthI18n ? window.HarthI18n.t(key, vars) : key;
        }
        function localeTag() {
          return window.HarthI18n ? window.HarthI18n.localeTag() : "ar";
        }

        function escapeHtml(s) {
          if (s == null) return "";
          return String(s).replace(/[&<>"']/g, (c) =>
            ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]),
          );
        }

        function money(n) { return Number(n || 0).toFixed(2) + " " + t("common.currency"); }

        function statusLabel(s) {
          const label = t(`track.statusLabels.${s}`);
          return label.startsWith("track.statusLabels.") ? s : label;
        }

        // ---------- Chat state ----------
        let currentOrderId = null;
        let chatPollInterval = null;
        const CHAT_POLL_MS = 10000; // 10 seconds

        // ---------- Track order ----------
        async function track(trackingNumber) {
          const $res = $("#result");
          // Stop any previous chat polling
          if (chatPollInterval) {
            clearInterval(chatPollInterval);
            chatPollInterval = null;
          }

          $res.innerHTML = `
            <div class="hs-card" style="padding: var(--sp-6); display: flex; flex-direction: column; gap: var(--sp-4)">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="skeleton skeleton--title" style="width:40%"></div>
                <div class="skeleton" style="height:24px;width:90px;border-radius:var(--r-pill)"></div>
              </div>
              <div class="skeleton skeleton--text" style="width:80%"></div>
              <div class="skeleton skeleton--text" style="width:60%"></div>
              <div style="display:flex;gap:var(--sp-3);margin-top:var(--sp-2)">
                <div class="skeleton" style="height:60px;width:60px;border-radius:50%"></div>
                <div class="skeleton" style="height:60px;width:60px;border-radius:50%"></div>
                <div class="skeleton" style="height:60px;width:60px;border-radius:50%"></div>
                <div class="skeleton" style="height:60px;width:60px;border-radius:50%"></div>
              </div>
            </div>
          `;

          try {
            const trackRes = await apiFetch(`/orders/track/${encodeURIComponent(trackingNumber)}`);
            if (!trackRes?.success) {
              throw new Error(trackRes?.error?.message || t("track.notFound"));
            }

            if (trackRes.type === "rental") {
              renderRentalResult(trackRes.rental);
              return;
            }

            const order = trackRes.order;
            currentOrderId = order.id;

            // Try to fetch delivery info (only works if logged in as customer).
            let delivery = null;
            if (getToken && getToken()) {
              try {
                const dRes = await apiFetch(`/deliveries?order_id=${order.id}`);
                if (dRes?.success && dRes.items?.length) delivery = dRes.items[0];
              } catch (_e) {
                // silent
              }
            }

            renderResult(order, delivery);
            // Start chat polling if we have an order ID and user is logged in
            if (currentOrderId && getToken && getToken()) {
              loadChatMessages(currentOrderId);
              chatPollInterval = setInterval(() => {
                loadChatMessages(currentOrderId, true); // silent refresh
              }, CHAT_POLL_MS);
            }
          } catch (err) {
            $res.innerHTML = `<div class="err-msg"><i class="fas fa-exclamation-circle" style="font-size:36px;margin-bottom:8px;display:block"></i>${escapeHtml(err.message)}</div>`;
          }
        }

        // ---------- Render order result + chat ----------
        function renderResult(order, delivery) {
          const banner = chooseBanner(order, delivery);
          const courierBlock = renderCourier(delivery);
          const timeline = renderTimeline(order, delivery);
          const proofBlock = renderProof(delivery);
          const chatBlock = renderChatSection(order.id);

          $("#result").innerHTML = `
            ${banner}
            <div class="info-grid">
              <div class="info-item">
                <div class="label">${t("track.info.trackingNumberLabel")}</div>
                <div class="value"><code>${escapeHtml(order.tracking_number)}</code></div>
              </div>
              <div class="info-item">
                <div class="label">${t("track.info.totalLabel")}</div>
                <div class="value">${money(order.total)}</div>
              </div>
              <div class="info-item">
                <div class="label">${t("track.info.orderStatusLabel")}</div>
                <div class="value">${escapeHtml(statusLabel(order.status))}</div>
              </div>
              <div class="info-item">
                <div class="label">${t("track.info.orderDateLabel")}</div>
                <div class="value">${new Date(order.created_at).toLocaleDateString(localeTag())}</div>
              </div>
            </div>
            ${courierBlock}
            ${timeline}
            ${proofBlock}
            ${chatBlock}
          `;
        }

        // ---------- Render rental result (no chat for rentals yet) ----------
        function renderRentalResult(r) {
          const rTotal = (Number(r.total_price||0) + Number(r.deposit_amount||0)).toFixed(2);
          const startD = (r.start_date||"—").slice(0,10);
          const endD   = (r.end_date||"—").slice(0,10);
          const stColor = { pending:"#f1c40f", approved:"#6ab04c", rejected:"#e74c3c", active:"#3498db", completed:"#6ab04c", cancelled:"#e74c3c" };
          const st = t(`track.rental.statusLabels.${r.status}`);
          const stLabel = st.startsWith("track.rental.statusLabels.") ? r.status : st;
          const color = stColor[r.status] || "#aaa";

          const steps = [
            { key:"pending",   label: t("track.rental.steps.ordered"),   icon:"fa-clock" },
            { key:"approved",  label: t("track.rental.steps.approved"),  icon:"fa-check-circle" },
            { key:"active",    label: t("track.rental.steps.started"),   icon:"fa-play-circle" },
            { key:"completed", label: t("track.rental.steps.completed"), icon:"fa-flag-checkered" },
          ];
          const order = ["pending","approved","active","completed","cancelled"];
          const currentIdx = order.indexOf(r.status);
          const timelineHtml = steps.map((s, i) => {
            const done = order.indexOf(s.key) <= currentIdx && r.status !== "cancelled";
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;position:relative">
              ${i < steps.length-1 ? `<div style="position:absolute;top:19px;inset-inline-start:50%;width:100%;height:2px;background:${done ? "#6ab04c" : "rgba(255,255,255,0.15)"}"></div>` : ""}
              <div style="width:38px;height:38px;border-radius:50%;background:${done ? "#6ab04c" : "rgba(255,255,255,0.1)"};display:flex;align-items:center;justify-content:center;position:relative;z-index:1;color:${done ? "#fff" : "rgba(255,255,255,0.4)"}">
                <i class="fas ${s.icon}"></i>
              </div>
              <div style="font-size:11px;text-align:center;color:${done ? "#fff" : "rgba(255,255,255,0.4)"}">${s.label}</div>
            </div>`;
          }).join("");

          $("#result").innerHTML = `
            <div class="hs-card" style="padding:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:16px;margin-bottom:16px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
                <div>
                  <div style="font-size:13px;color:rgba(255,255,255,0.5)">${t("track.rental.trackingNumberLabel")}</div>
                  <code style="font-size:16px;font-weight:700;color:#f1c40f">${escapeHtml(r.tracking_number)}</code>
                </div>
                <span style="background:${color}22;color:${color};padding:6px 14px;border-radius:20px;font-weight:700;font-size:13px">${escapeHtml(stLabel)}</span>
              </div>
              ${r.equipment_name ? `<div style="display:flex;align-items:center;gap:12px;padding:12px;background:rgba(241,196,15,0.06);border-radius:10px;margin-bottom:18px">
                ${r.equipment_image ? `<img src="${escapeHtml(r.equipment_image)}" style="width:52px;height:52px;object-fit:cover;border-radius:8px">` : `<div style="width:52px;height:52px;background:rgba(255,255,255,0.07);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px">🚜</div>`}
                <div>
                  <div style="font-weight:700;color:#fff">${escapeHtml(r.equipment_name)}</div>
                  ${r.equipment_category ? `<div style="font-size:12px;color:rgba(255,255,255,0.5)">${escapeHtml(r.equipment_category)}</div>` : ""}
                </div>
              </div>` : ""}
              <div class="info-grid" style="margin-bottom:18px">
                <div class="info-item"><div class="label">${t("track.rental.startDateLabel")}</div><div class="value">${startD}</div></div>
                <div class="info-item"><div class="label">${t("track.rental.endDateLabel")}</div><div class="value">${endD}</div></div>
                <div class="info-item"><div class="label">${t("track.rental.totalLabel")}</div><div class="value">${rTotal} ${t("common.currency")}</div></div>
                <div class="info-item"><div class="label">${t("track.rental.orderDateLabel")}</div><div class="value">${new Date(r.created_at).toLocaleDateString(localeTag())}</div></div>
              </div>
              <div style="display:flex;gap:8px;justify-content:space-between;margin-top:8px">
                ${timelineHtml}
              </div>
            </div>
          `;
        }

        // ---------- Proof galleries ----------
        function renderProof(delivery) {
          if (!delivery) return "";
          const parse = (v) => {
            if (Array.isArray(v)) return v;
            if (typeof v === "string") {
              try { const p = JSON.parse(v); return Array.isArray(p) ? p : []; }
              catch { return []; }
            }
            return [];
          };
          const pickupImgs = parse(delivery.pickup_proof_images);
          const deliveryImgs = parse(delivery.delivery_proof_images);
          if (!pickupImgs.length && !deliveryImgs.length) return "";

          const gallery = (title, icon, imgs) =>
            imgs.length
              ? `
                <div style="margin-top:16px">
                  <h4 style="color:#6ab04c;font-size:14px;margin-bottom:8px">
                    <i class="fas ${icon}"></i> ${title}
                  </h4>
                  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">
                    ${imgs
                      .map(
                        (u) =>
                          `<a href="${escapeHtml(u)}" target="_blank" rel="noopener"><img src="${escapeHtml(u)}" style="width:100%;height:100px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,0.2)" /></a>`,
                      )
                      .join("")}
                  </div>
                </div>`
              : "";

          return `
            <div style="margin-top:20px;padding:16px;background:rgba(0,0,0,0.2);border-radius:10px">
              <h3 style="color:#fff;font-size:16px;margin-bottom:10px">
                <i class="fas fa-camera"></i> ${t("track.proof.title")}
              </h3>
              ${gallery(t("track.proof.pickupTitle"), "fa-dolly", pickupImgs)}
              ${gallery(t("track.proof.deliveryTitle"), "fa-check-circle", deliveryImgs)}
            </div>
          `;
        }

        // ---------- Status banner ----------
        function chooseBanner(order, delivery) {
          if (order.status === "cancelled" || order.status === "refunded") {
            return `
              <div class="status-banner cancelled">
                <div class="icon"><i class="fas fa-times-circle"></i></div>
                <div class="status-text">${statusLabel(order.status)}</div>
              </div>`;
          }
          if (order.status === "delivered") {
            return `
              <div class="status-banner delivered">
                <div class="icon"><i class="fas fa-check-circle"></i></div>
                <div class="status-text">${t("track.banner.deliveredText")}</div>
              </div>`;
          }
          if (delivery && delivery.courier_id) {
            return `
              <div class="status-banner assigned">
                <div class="icon"><i class="fas fa-truck"></i></div>
                <div class="status-text">${delivery.status === "in_transit" ? t("track.banner.courierInTransit") : t("track.banner.courierAssigned")}</div>
              </div>`;
          }
          return `
            <div class="status-banner pending">
              <div class="icon"><i class="fas fa-hourglass-half"></i></div>
              <div class="status-text">${t("track.banner.pendingTitle")}</div>
              <p style="font-size:14px;color:#ddd;margin-top:8px">${t("track.banner.pendingHint")}</p>
            </div>`;
        }

        // ---------- Courier info ----------
        function renderCourier(delivery) {
          if (!delivery || !delivery.courier_id) return "";
          if (!delivery.courier_name && !delivery.courier_phone) {
            return `
              <div class="courier-card">
                <h4><i class="fas fa-user-tie"></i> ${t("track.courier.assignedTitle")}</h4>
                <p style="font-size:13px;color:#ccc">
                  ${t("track.courier.loginToSeeHint")}
                </p>
              </div>`;
          }
          return `
            <div class="courier-card">
              <h4><i class="fas fa-user-tie"></i> ${t("track.courier.infoTitle")}</h4>
              <div class="courier-row">
                <i class="fas fa-user"></i>
                <div>
                  <div style="font-size:12px;color:#aaa">${t("track.courier.nameLabel")}</div>
                  <div style="font-size:16px;font-weight:700">${escapeHtml(delivery.courier_name || "—")}</div>
                </div>
              </div>
              ${delivery.courier_phone ? `
                <div class="courier-row">
                  <i class="fas fa-phone"></i>
                  <div>
                    <div style="font-size:12px;color:#aaa">${t("track.courier.phoneLabel")}</div>
                    <div style="font-size:16px;font-weight:700">
                      <a href="tel:${escapeHtml(delivery.courier_phone)}" style="color:#a3d5ff;text-decoration:none">
                        ${escapeHtml(delivery.courier_phone)}
                      </a>
                    </div>
                  </div>
                </div>` : ""}
            </div>`;
        }

        // ---------- Timeline ----------
        function renderTimeline(order, delivery) {
          const steps = [
            { label: t("track.timeline.orderCreated"), icon: "shopping-cart" },
            { label: t("track.timeline.acceptedByCourier"), icon: "user-check" },
            { label: t("track.timeline.inTransit"), icon: "truck" },
            { label: t("track.timeline.delivered"), icon: "flag-checkered" },
          ];

          let currentIdx = 0;
          if (delivery) {
            if (["accepted", "picked_up"].includes(delivery.status)) currentIdx = 1;
            else if (delivery.status === "in_transit") currentIdx = 2;
            else if (delivery.status === "delivered") currentIdx = 3;
          }
          if (order.status === "delivered") currentIdx = 3;

          const html = steps.map((st, i) => {
            const cls = i < currentIdx ? "done" : i === currentIdx ? "current" : "future";
            return `
              <div class="timeline-item ${cls}">
                <div class="tl-text">
                  <i class="fas fa-${st.icon}" style="margin-inline-end:6px"></i>
                  ${st.label}
                </div>
              </div>`;
          }).join("");

          return `<div class="timeline">${html}</div>`;
        }

        // ================================================================
        //  CHAT
        // ================================================================

        function renderChatSection(orderId) {
          const isLoggedIn = getToken && getToken();
          if (!isLoggedIn) {
            return `
              <div class="chat-section" style="opacity:0.6">
                <h4><i class="fas fa-comment-dots"></i> ${t("track.chat.title")}</h4>
                <p style="color:rgba(255,255,255,0.4);font-size:13px;text-align:center;padding:10px 0">
                  <i class="fas fa-lock"></i> ${t("track.chat.loginRequired")}
                </p>
              </div>
            `;
          }
          return `
            <div class="chat-section" id="chat-section" data-order-id="${orderId}">
              <h4><i class="fas fa-comment-dots"></i> ${t("track.chat.title")}</h4>
              <div class="chat-messages" id="chat-messages">
                <div class="chat-empty">${t("track.chat.noMessages")}</div>
              </div>
              <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="${t("track.chat.inputPlaceholder")}" />
                <button id="chat-send-btn" disabled>${t("track.chat.sendBtn")}</button>
              </div>
            </div>
          `;
        }

        // Load chat messages from server
        async function loadChatMessages(orderId, silent = false) {
          if (!orderId) return;
          try {
            const res = await apiFetch(`/chat/${orderId}`);
            if (!res?.success) {
              if (!silent) console.warn("Chat load error:", res?.error);
              return;
            }
            renderChatMessages(res.messages || []);
          } catch (err) {
            if (!silent) console.error("Chat load error:", err);
          }
        }

        // Render messages into the chat container
        function renderChatMessages(messages) {
          const container = document.getElementById("chat-messages");
          if (!container) return;

          if (!messages.length) {
            container.innerHTML = `<div class="chat-empty">${t("track.chat.noMessages")}</div>`;
            return;
          }

          // Get current user info (if available)
          const user = getUser ? getUser() : null;
          const userId = user?.id || null;

          let html = "";
          for (const msg of messages) {
            const isOwn = msg.user_id === userId;
            const senderClass = isOwn ? "own" : "";
            let senderLabel = "";
            if (msg.role === "courier") senderLabel = t("track.chat.courierLabel");
            else if (msg.role === "farmer") senderLabel = t("track.chat.farmerLabel");
            else if (msg.role === "customer") senderLabel = t("track.chat.customerLabel");
            else senderLabel = msg.sender_name || "";

            const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString(localeTag(), { hour:'2-digit', minute:'2-digit' }) : "";

            if (msg.is_system) {
              html += `
                <div class="chat-msg system">
                  ${escapeHtml(msg.content)}
                  ${time ? `<span class="time">${time}</span>` : ""}
                </div>
              `;
            } else {
              html += `
                <div class="chat-msg ${senderClass}">
                  ${senderLabel ? `<span class="sender ${msg.role}">${escapeHtml(senderLabel)}</span>` : ""}
                  ${escapeHtml(msg.content)}
                  ${time ? `<span class="time">${time}</span>` : ""}
                </div>
              `;
            }
          }
          container.innerHTML = html;
          // Scroll to bottom
          container.scrollTop = container.scrollHeight;
        }

        // Send a new message
        async function sendChatMessage(orderId) {
          const input = document.getElementById("chat-input");
          const btn = document.getElementById("chat-send-btn");
          if (!input || !btn) return;
          const content = input.value.trim();
          if (!content || !orderId) return;

          btn.disabled = true;
          try {
            const res = await apiFetch(`/chat/${orderId}`, {
              method: "POST",
              body: JSON.stringify({ content }),
            });
            if (!res?.success) {
              alert(res?.error?.message || t("track.chat.sendError"));
              return;
            }
            input.value = "";
            // Reload messages
            await loadChatMessages(orderId);
          } catch (err) {
            alert(err.message || t("track.chat.sendError"));
          } finally {
            btn.disabled = false;
          }
        }

        // ---------- Chat event wiring ----------
        function setupChatEvents(orderId) {
          const input = document.getElementById("chat-input");
          const btn = document.getElementById("chat-send-btn");
          if (!input || !btn) return;

          // Enable/disable send button based on input
          input.addEventListener("input", () => {
            btn.disabled = !input.value.trim();
          });
          // Send on Enter
          input.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              if (input.value.trim()) sendChatMessage(orderId);
            }
          });
          btn.addEventListener("click", () => sendChatMessage(orderId));
        }

        // Override renderResult to attach chat events after DOM update
        const originalRenderResult = renderResult;
        renderResult = function(order, delivery) {
          originalRenderResult(order, delivery);
          // Re-bind chat events if chat section exists
          const chatSection = document.getElementById("chat-section");
          if (chatSection && order?.id) {
            setupChatEvents(order.id);
            // Also load messages again to be safe
            loadChatMessages(order.id);
          }
        };

        // ---------- Search ----------
        $("#search-btn").addEventListener("click", () => {
          const trackingNo = $("#tracking-input").value.trim();
          if (!trackingNo) return;
          // Stop old polling
          if (chatPollInterval) {
            clearInterval(chatPollInterval);
            chatPollInterval = null;
          }
          track(trackingNo);
        });
        $("#tracking-input").addEventListener("keypress", (e) => {
          if (e.key === "Enter") $("#search-btn").click();
        });

        // Auto-search from ?t=
        function autoSearchFromQuery() {
          const url = new URL(window.location.href);
          const trackingNo = url.searchParams.get("t");
          if (trackingNo) {
            $("#tracking-input").value = trackingNo;
            track(trackingNo);
          }
        }

        document.addEventListener("DOMContentLoaded", () => {
          if (window.HarthI18n) {
            window.HarthI18n.ready().then(autoSearchFromQuery);
          } else {
            autoSearchFromQuery();
          }
        });
      })();
    </script>
  
    <script src="responsive.js" defer></script>
  </body>
</html>
